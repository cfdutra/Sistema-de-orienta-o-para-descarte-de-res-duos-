<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarte Consciente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Descarte Consciente ♻️</h1>
        <p>Selecione o tipo de resíduo abaixo para encontrar o local de descarte correto mais próximo de você.</p>

        <div class="botoes-container">
            <button onclick="buscarLocais('pilha')" class="btn">🔋 Pilhas e Baterias</button>
            <button onclick="buscarLocais('oleo')" class="btn">🛢️ Óleo de Cozinha</button>
            <button onclick="buscarLocais('eletronico')" class="btn">💻 Lixo Eletrônico</button>
        </div>

        <div id="area-resultados" class="resultados">
            <p class="mensagem-inicial">Os pontos de coleta aparecerão aqui.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
